<header class="h-16 bg-white shadow-sm border-b border-gray-100 flex items-center justify-between px-6 z-10 w-full transition-all">
  <!-- Left Side: Search -->
  <div class="flex items-center gap-4 flex-1">
    <div class="relative w-full max-w-md hidden md:block">
      <span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">search</span>
      <input type="text" placeholder="Search across platform (Users, Workshops)..." 
             class="w-full pl-10 pr-4 py-2 bg-light-grey text-gray-700 border-none rounded-lg focus:ring-2 focus:ring-black focus:outline-none transition-shadow placeholder-gray-400">
    </div>
  </div>

  <!-- Right Side: Actions & Profile -->
  <div class="flex items-center gap-4 shrink-0">
    <button class="relative p-2 text-gray-500 hover:text-black transition-colors hover:bg-light-grey rounded-full">
      <span class="material-icons">notifications</span>
      <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-gray-500 rounded-full"></span>
    </button>
    <button class="p-2 text-gray-500 hover:text-black transition-colors hover:bg-light-grey rounded-full hidden sm:block">
      <span class="material-icons">mail</span>
    </button>
    <div class="w-px h-8 bg-gray-200 mx-2"></div>
    <div class="flex items-center gap-3 cursor-pointer group">
      <div class="flex flex-col items-end hidden sm:flex">
        <span class="text-sm font-semibold text-gray-700 group-hover:text-black transition-colors tracking-tight">Admin User</span>
        <span class="text-xs text-gray-500">Super Admin</span>
      </div>
      <div class="w-10 h-10 rounded-full bg-black text-white flex items-center justify-center font-bold font-heading shadow-sm group-hover:ring-2 ring-black/30 transition-all">
        AU
      </div>
      <span class="material-icons text-gray-400 group-hover:text-gray-600 transition-colors">expand_more</span>
    </div>
  </div>
</header>
